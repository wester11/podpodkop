<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Podkop — Конструктор ключа</title>
  <style>
    :root {
      --bg: #0b1120;
      --card: #111827;
      --text: #e5e7eb;
      --muted: #9ca3af;
      --accent: #22c55e;
      --accent2: #16a34a;
      --line: #1f2937;
      --tag-bg: #1e3a5f;
      --tag-border: #2563eb;
      --cat-head: #162032;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: radial-gradient(circle at 20% 0%, #1a2840, #0b1120 50%);
      color: var(--text);
      font-family: "Segoe UI", Tahoma, sans-serif;
      min-height: 100vh;
    }
    .wrap { max-width: 1280px; margin: 0 auto; padding: 24px 16px 48px; }

    /* HEADER */
    .header { margin-bottom: 20px; }
    .header h1 { margin: 0 0 4px; font-size: 24px; }
    .header p { color: var(--muted); margin: 0; font-size: 13px; }
    .badge {
      display: inline-block;
      background: #14532d;
      color: var(--accent);
      font-size: 11px;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 20px;
      margin-left: 8px;
      vertical-align: middle;
    }

    .main-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 16px;
    }
    @media (max-width: 860px) { .main-grid { grid-template-columns: 1fr; } }

    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 16px;
    }
    .card-title {
      font-size: 14px;
      font-weight: 700;
      margin: 0 0 10px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .card-title .cnt {
      font-size: 11px;
      font-weight: 600;
      background: #1e3a2f;
      color: var(--accent);
      padding: 1px 7px;
      border-radius: 20px;
    }

    /* SEARCH */
    .search-row {
      display: flex;
      gap: 6px;
      margin-bottom: 8px;
    }
    .search-row input {
      flex: 1;
      background: #0b1220;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 6px 10px;
      color: var(--text);
      font-size: 13px;
      outline: none;
    }
    .search-row input:focus { border-color: #22c55e55; }
    .search-row input::placeholder { color: #4b5563; }
    .btn-xs {
      background: #1f2937;
      border: 1px solid var(--line);
      color: var(--muted);
      font-size: 11px;
      padding: 5px 9px;
      border-radius: 7px;
      cursor: pointer;
      white-space: nowrap;
    }
    .btn-xs:hover { background: #374151; color: var(--text); }

    /* LISTS PANEL */
    .lists-scroll {
      max-height: 480px;
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: #1f2937 transparent;
    }
    .list-item {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      padding: 7px 8px;
      border-radius: 8px;
      cursor: pointer;
      transition: background .12s;
    }
    .list-item:hover { background: #1a2840; }
    .list-item input[type=checkbox] { margin-top: 2px; accent-color: var(--accent); cursor: pointer; flex-shrink: 0; }
    .li-name { font-size: 13px; font-weight: 600; }
    .li-desc { font-size: 11px; color: var(--muted); margin-top: 1px; }

    /* SERVICES — categories */
    .services-scroll {
      max-height: 480px;
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: #1f2937 transparent;
    }
    .cat-block { margin-bottom: 3px; }
    .cat-head {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 8px;
      background: var(--cat-head);
      border-radius: 8px;
      cursor: pointer;
      user-select: none;
      font-size: 12px;
      font-weight: 700;
      color: #93c5fd;
    }
    .cat-head:hover { background: #1d3352; }
    .cat-head .arrow { transition: transform .18s; font-size: 9px; }
    .cat-head.open .arrow { transform: rotate(90deg); }
    .cat-head .emo { font-size: 14px; }
    .cat-head .cat-cnt { margin-left: auto; font-size: 11px; color: var(--muted); }
    .cat-head .cat-sel { color: var(--accent); font-size: 11px; }
    .cat-body { padding: 2px 0 2px 8px; }
    .cat-body.hidden { display: none; }

    .svc-item {
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 4px 8px;
      border-radius: 7px;
      cursor: pointer;
      transition: background .1s;
    }
    .svc-item:hover { background: #1a2840; }
    .svc-item input[type=checkbox] { accent-color: var(--accent); cursor: pointer; flex-shrink: 0; }
    .svc-label { font-size: 13px; color: var(--text); }

    /* SELECTED TAGS */
    .selected-card { margin-bottom: 14px; }
    .tags-row {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      min-height: 26px;
      padding: 2px 0;
    }
    .tag {
      background: var(--tag-bg);
      border: 1px solid var(--tag-border);
      color: #93c5fd;
      font-size: 12px;
      font-weight: 600;
      padding: 2px 9px;
      border-radius: 20px;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .tag-list { border-color: #22c55e; background: #0d2e1a; color: #86efac; }
    .tag .rm { cursor: pointer; opacity: .5; font-style: normal; }
    .tag .rm:hover { opacity: 1; }
    .empty-hint { font-size: 12px; color: #374151; }

    /* KEY OUTPUT */
    textarea {
      width: 100%;
      min-height: 80px;
      border-radius: 10px;
      border: 1px solid var(--line);
      background: #07101e;
      color: #86efac;
      padding: 10px;
      resize: vertical;
      font-family: Consolas, "Courier New", monospace;
      font-size: 12px;
      line-height: 1.6;
    }
    .actions { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 10px; }
    button.primary {
      background: var(--accent);
      border: 0;
      color: #052e16;
      font-weight: 700;
      padding: 9px 16px;
      border-radius: 9px;
      cursor: pointer;
      font-size: 13px;
    }
    button.primary:hover { background: var(--accent2); }
    button.secondary {
      background: #1f2937;
      border: 1px solid var(--line);
      color: var(--text);
      font-weight: 600;
      padding: 9px 16px;
      border-radius: 9px;
      cursor: pointer;
      font-size: 13px;
    }
    button.secondary:hover { background: #374151; }
    .hint { margin-top: 10px; font-size: 12px; color: var(--muted); line-height: 1.6; }
    code {
      display: block;
      margin-top: 4px;
      background: #07101e;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 6px 10px;
      font-family: Consolas, monospace;
      font-size: 12px;
      word-break: break-all;
      color: #86efac;
    }
    .no-match { font-size: 12px; color: #374151; padding: 8px; }
    .copied { background: #14532d !important; color: var(--accent) !important; }
  </style>
</head>
<body>
<div class="wrap">
  <div class="header">
    <h1>Конструктор ключа Podkop <span class="badge">v2</span></h1>
    <p>Выберите группы и/или отдельные сервисы — ключ вставьте в установщик.</p>
  </div>

  <!-- SELECTED TAGS -->
  <div class="card selected-card">
    <div class="card-title">
      Выбрано
      <span class="cnt" id="selTotal">0</span>
    </div>
    <div class="tags-row" id="tagsRow">
      <span class="empty-hint">Ничего не выбрано</span>
    </div>
  </div>

  <div class="main-grid">
    <!-- LISTS PANEL -->
    <div class="card">
      <div class="card-title">
        Групповые списки
        <span class="cnt" id="listsCnt">0</span>
      </div>
      <div class="search-row">
        <input type="text" id="listsSearch" placeholder="Поиск…">
        <button class="btn-xs" id="listsSelAll">Все</button>
        <button class="btn-xs" id="listsClearBtn">Сбросить</button>
      </div>
      <div class="lists-scroll" id="listsBox"></div>
    </div>

    <!-- SERVICES PANEL -->
    <div class="card">
      <div class="card-title">
        Сервисы
        <span class="cnt" id="svcCnt">0</span>
      </div>
      <div class="search-row">
        <input type="text" id="svcSearch" placeholder="Поиск…">
        <button class="btn-xs" id="svcSelAll">Все</button>
        <button class="btn-xs" id="svcClearBtn">Сбросить</button>
      </div>
      <div class="services-scroll" id="servicesBox"></div>
    </div>
  </div>

  <!-- KEY -->
  <div class="card">
    <div class="card-title">Ключ</div>
    <textarea id="token" readonly placeholder="Нажмите «Сгенерировать» или выберите пункты выше…"></textarea>
    <div class="actions">
      <button class="primary" id="gen">⚡ Сгенерировать</button>
      <button class="secondary" id="copy">📋 Копировать</button>
      <button class="secondary" id="resetAll">✕ Сбросить всё</button>
    </div>
    <div class="hint">
      Пример запуска:
      <code>PODKOP_KEY='ВАШ_КЛЮЧ' sh &lt;(wget -O - https://raw.githubusercontent.com/wester11/podpodkop/main/podkop-fork/install.sh)</code>
    </div>
  </div>
</div>
<script src="./selector.js"></script>
</body>
</html>
